<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Sree Sastha Computers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-storage-compat.js"></script>
  <script src="firebase.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen flex items-center justify-center">
  <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
    <h1 class="text-4xl font-bold text-center text-slate-800">Sree Sastha</h1>
    <p class="text-center text-slate-500 mb-8">Computer Service - Admin Portal</p>
    
    <input id="email" type="email" placeholder="Admin Email" class="w-full p-4 border rounded-2xl mb-4">
    <input id="password" type="password" placeholder="Password" class="w-full p-4 border rounded-2xl mb-6">
    
    <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold text-lg">
      Login
    </button>
  </div>

  <script>
    function login() {
      auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value)
        .then(() => location = 'dashboard.html')
        .catch(e => alert("Login Failed: " + e.message));
    }
  </script>
</body>
</html>
