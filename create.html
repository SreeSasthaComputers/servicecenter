<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Job - Sree Sastha Computers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-storage-compat.js"></script>
  <script src="firebase.js"></script>
</head>
<body class="bg-slate-50">
  <div class="max-w-2xl mx-auto p-6">
    <div id="loading" class="text-center py-20">Checking access...</div>
    
    <div id="mainContent" class="hidden">
      <h1 class="text-4xl font-bold text-center mb-8">Create New Service Job</h1>
      
      <div class="bg-white rounded-3xl shadow-xl p-8 space-y-8">
        <div><label>Job Date</label><input id="date" type="date" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
        <div><label>Customer Name <span class="text-red-500">*</span></label><input id="name" type="text" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
        <div><label>Customer Phone (with 91) <span class="text-red-500">*</span></label><input id="phone" type="text" placeholder="917907502401" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
        <div><label>Product Type</label><select id="product" class="w-full p-4 border border-slate-300 rounded-2xl">... (same options as before)</select></div>
        <div><label>Accessories</label><div class="grid grid-cols-2 gap-4">... (same checkboxes)</div><input id="accOther" placeholder="Other accessories" class="mt-4 w-full p-4 border border-slate-300 rounded-2xl"></div>
        <div><label>Complaint / Service Required</label><textarea id="complaint" rows="4" class="w-full p-4 border border-slate-300 rounded-2xl"></textarea></div>
        <div><label>Upload Photo (Optional)</label><input id="photo" type="file" accept="image/*" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
        <div><label>Estimate Completion Date</label><input id="delivery" type="date" class="w-full p-4 border border-slate-300 rounded-2xl"></div>
        <div><label>Estimate Amount ₹</label><input id="estimate" type="number" class="w-full p-4 border border-slate-300 rounded-2xl"></div>

        <button onclick="createJob()" class="w-full bg-green-600 text-white py-5 rounded-3xl font-semibold text-xl">Create Job & Send WhatsApp</button>
      </div>
    </div>
  </div>

  <script>
    // Security Check - Redirect if not logged in
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
      }
    });

    async function createJob() {

    }
  </script>
</body>
</html>
