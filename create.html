<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Job - Sree Sastha Computers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-storage-compat.js"></script>
  <script src="firebase.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50">
  <div class="max-w-2xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-8 text-slate-800">Create New Service Job</h1>
    
    <div class="bg-white rounded-3xl shadow-xl p-8 space-y-8">

      <!-- 1. Job Date -->
      <div>
        <label class="block text-sm font-medium mb-1">Job Date</label>
        <input id="date" type="date" class="w-full p-4 border border-slate-300 rounded-2xl">
      </div>

      <!-- 2. Customer Name -->
      <div>
        <label class="block text-sm font-medium mb-1">Customer Name <span class="text-red-500">*</span></label>
        <input id="name" type="text" class="w-full p-4 border border-slate-300 rounded-2xl">
      </div>

      <!-- 3. Customer Phone -->
      <div>
        <label class="block text-sm font-medium mb-1">Customer Phone (with 91) <span class="text-red-500">*</span></label>
        <input id="phone" type="text" placeholder="9199XXXXXX" class="w-full p-4 border border-slate-300 rounded-2xl">
      </div>

      <!-- 4. Product Type -->
      <div>
        <label class="block text-sm font-medium mb-1">Product Type</label>
        <select id="product" class="w-full p-4 border border-slate-300 rounded-2xl">
          <option>Laptop</option>
          <option>Desktop PC</option>
          <option>Printer</option>
          <option>All in One</option>
          <option>Other</option>
        </select>
      </div>

      <!-- 5. Accessories -->
      <div>
        <label class="block text-sm font-medium mb-3">Accessories</label>
        <div class="grid grid-cols-2 gap-4">
          <label class="flex items-center gap-3"><input type="checkbox" id="accCharger"> Laptop Charger</label>
          <label class="flex items-center gap-3"><input type="checkbox" id="accBag"> Laptop Bag</label>
          <label class="flex items-center gap-3"><input type="checkbox" id="accMouse"> Mouse</label>
          <label class="flex items-center gap-3"><input type="checkbox" id="accKeyboard"> Keyboard</label>
        </div>
        <input id="accOther" placeholder="Other accessories (if any)" class="mt-4 w-full p-4 border border-slate-300 rounded-2xl">
      </div>

      <!-- 6. Complaint -->
      <div>
        <label class="block text-sm font-medium mb-1">Complaint / Service Required</label>
        <textarea id="complaint" rows="4" class="w-full p-4 border border-slate-300 rounded-2xl"></textarea>
      </div>

      <!-- 7. Upload Photo -->
      <div>
        <label class="block text-sm font-medium mb-1">Upload Photo (Optional)</label>
        <input id="photo" type="file" accept="image/*" class="w-full p-4 border border-slate-300 rounded-2xl">
      </div>

      <!-- 8. Estimate Completion Date -->
      <div>
        <label class="block text-sm font-medium mb-1">Estimate Completion Date</label>
        <input id="delivery" type="date" class="w-full p-4 border border-slate-300 rounded-2xl">
      </div>

      <!-- 9. Estimate Amount -->
      <div>
        <label class="block text-sm font-medium mb-1">Estimate Amount ₹</label>
        <input id="estimate" type="number" placeholder="0" class="w-full p-4 border border-slate-300 rounded-2xl">
      </div>

      <button onclick="createJob()" 
              class="w-full bg-green-600 hover:bg-green-700 text-white py-5 rounded-3xl font-semibold text-xl">
        Create Job & Send WhatsApp
      </button>
    </div>
  </div>

  <script>
    async function createJob() {
      try {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();

        if (!name || !phone) {
          alert("Customer Name and Phone Number are required!");
          return;
        }

        // Generate Job Number
        const snap = await db.collection('jobs').orderBy('num', 'desc').limit(1).get();
        let num = 1;
        if (!snap.empty) num = snap.docs[0].data().num + 1;
        const jobNo = "SS-" + String(num).padStart(4, '0');

        // Photo Upload
        let photoURL = "";
        const file = document.getElementById('photo').files[0];
        if (file) {
          const ref = storage.ref('photos/' + jobNo);
          const upload = await ref.put(file);
          photoURL = await upload.ref.getDownloadURL();
        }

        // Accessories
        let accessories = [];
        if (document.getElementById('accCharger').checked) accessories.push("Charger");
        if (document.getElementById('accBag').checked) accessories.push("Bag");
        if (document.getElementById('accMouse').checked) accessories.push("Mouse");
        if (document.getElementById('accKeyboard').checked) accessories.push("Keyboard");
        if (document.getElementById('accOther').value.trim()) accessories.push(document.getElementById('accOther').value.trim());

        // Save to Firestore
        await db.collection('jobs').add({
          jobNo: jobNo,
          num: num,
          date: document.getElementById('date').value,
          name: name,
          phone: phone,
          product: document.getElementById('product').value,
          acc: accessories,
          complaint: document.getElementById('complaint').value,
          delivery: document.getElementById('delivery').value,
          estimate: document.getElementById('estimate').value ? Number(document.getElementById('estimate').value) : 0,
          status: "Order Taken",
          photo: photoURL,
          completionNote: "",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });

        // WhatsApp Message
        const message = `Hello ${name} 👋\n\nYour job has been registered.\n\nJob Number: ${jobNo}\nProduct: ${document.getElementById('product').value}\nEstimate Amount: ₹${document.getElementById('estimate').value || 'Not given'}\nExpected Completion: ${document.getElementById('delivery').value || 'Not given'}`;

        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, "_blank");

        alert(`✅ Job Created Successfully!\nJob Number: ${jobNo}`);

      } catch (error) {
        console.error(error);
        alert("Error: " + error.message);
      }
    }
  </script>
</body>
</html>
